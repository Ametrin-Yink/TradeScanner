# Strategy Configuration Template
# Copy this file to config/strategy_config.yaml and customize thresholds

# Common parameters used across strategies
common_params:
  min_dollar_volume: 50_000_000
  min_atr_pct: 0.015
  min_listing_days: 50

# Strategy A: VCP-EP (Volatility Contraction Pattern - Entry Point)
strategy_a_vcp_ep:
  min_platform_days: 15
  max_platform_range_pct: 0.05
  min_contraction_factor: 0.6
  breakout_threshold_pct: 0.02
  target_r_multiplier: 2.5

# Strategy B: Momentum (Breakout continuation)
strategy_b_momentum:
  min_adx: 25
  min_rs_score: 75
  volume_breakout_threshold: 1.5
  target_r_multiplier: 3.0

# Strategy C: Shoryuken (Pullback reversal)
strategy_c_shoryuken:
  pullback_max_pct: 0.08
  pullback_min_pct: 0.03
  volume_dry_up_threshold: 0.7
  target_r_multiplier: 2.0

# Strategy D: Pullbacks (Trend continuation)
strategy_d_pullbacks:
  ema_proximity_pct: 0.02
  trend_strength_min: 0.6
  volume_contraction_threshold: 0.8
  target_r_multiplier: 2.5

# Strategy E: Upthrust & Rebound (Support bounce)
strategy_e_upthrust_rebound:
  max_distance_from_support: 0.03
  support_tolerance_atr: 0.5
  volume_veto_threshold: 1.5
  clv_veto_threshold: 0.3
  target_r_multiplier: 2.0

# Strategy F: Range Support/Resistance (Range trading)
strategy_f_range_support:
  max_distance_from_level: 0.03
  min_range_width_atr_multiple: 1.5
  min_test_interval_days: 3
  time_decay_days: 5
  target_r_multiplier: 2.5

# Strategy G: DTSS (Distribution/Accumulation)
strategy_g_dtss:
  max_distance_from_level: 0.03
  min_test_interval_days: 10
  volume_climax_threshold: 4.0
  vix_reject_threshold: 30.0
  vix_limit_threshold: 25.0
  target_r_multiplier: 3.0

# Strategy H: Parabolic/Capitulation (Extreme reversal)
strategy_h_parabolic:
  rsi_overbought: 80
  rsi_oversold: 20
  ema_atr_multiplier: 5.0
  volume_climax_threshold: 4.0
  stop_atr_multiplier: 2.0
  target_r_multiplier: 2.5

# Scoring dimension weights (all strategies use 0-15 scale)
scoring_weights:
  tier_s_threshold: 13.0
  tier_a_threshold: 10.0
  tier_b_threshold: 7.0

# Risk management
risk_management:
  max_position_pct_tier_s: 0.20
  max_position_pct_tier_a: 0.10
  max_position_pct_tier_b: 0.05
  max_portfolio_risk_daily: 0.02

# Market regime detection
market_regime:
  spy_ema_period: 50
  trend_strength_threshold: 0.02
  vix_high_threshold: 30
  vix_normal_threshold: 20
