# config/portfolio_config.yaml

# Stop/target computation parameters
stop_target:
  max_stop_distance_atr: 2.5 # max stop distance in ATR units
  max_stop_distance_pct: 0.05 # max stop distance as fraction of price
  min_rr_swing: 2.5 # minimum risk:reward for swing trades
  min_rr_position: 2.0 # minimum risk:reward for position trades
  fib_extension_default: 1.618 # Fibonacci extension multiplier
  atr_multiplier_swing: 1.5 # ATR multiplier for stop fallback

# S/R detection parameters
sr:
  lookback_bars: 120
  swing_order_min: 3
  swing_order_max: 8
  cluster_method: complete
  zone_min_touches: 2
  price_filter_atr_mult: 5.0
  price_filter_min_pct: 0.10

# Scoring weights for stock highlight ranking
scoring:
  momentum_weight: 0.30
  quality_weight: 0.30
  structure_weight: 0.25
  volatility_penalty_weight: 0.05
  min_composite_score: 20
  setup_bonus:
    Breakout: 1.0
    Strong Momentum: 0.95
    Near Support: 0.85
    Resistance Test: 0.80
    Good R/R: 0.75
    MA Bounce: 0.85
    Inside Day Breakout: 0.90
    Bull Flag: 0.80
    ADX Trend: 0.90
  diversity_soft_threshold: 0.70
  max_pct_from_single_setup: 0.60
